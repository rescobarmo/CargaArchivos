version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: carga_archivos_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: carga_archivos
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  app:
    build: .
    container_name: carga_archivos_app
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_DATABASE: carga_archivos
    depends_on:
      - mysql
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./data:/app/data
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
