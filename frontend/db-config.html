<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuracion MySQL - Carga de Archivos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6' rx='15'/%3E%3Cpath d='M30 40 L50 60 L70 40' stroke='white' stroke-width='8' fill='none'/%3E%3C/svg%3E" />
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Configuracion MySQL</h1>
        <p class="text-sm text-gray-500">Configura la conexion a la base de datos</p>
      </div>
      <a href="/" class="text-sm text-blue-600 hover:underline">Volver al inicio</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <section class="bg-white rounded-xl shadow-sm border p-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Parametros de conexion</h2>

      <form id="dbConfigForm" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Host</label>
            <input id="host" type="text" value="localhost" class="w-full border rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Puerto</label>
            <input id="port" type="number" value="3306" class="w-full border rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
            <input id="user" type="text" value="root" class="w-full border rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="password" type="password" placeholder="(sin cambios)" class="w-full border rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Base de datos</label>
          <input id="database" type="text" value="carga_archivos" class="w-full border rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>

        <div class="flex gap-3 pt-4">
          <button type="button" id="testBtn" class="px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 disabled:opacity-50">Probar conexion</button>
          <button type="submit" id="saveBtn" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50">Guardar configuracion</button>
        </div>
      </form>

      <div id="alertBox" class="hidden mt-4 p-3 rounded-lg text-sm"></div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border p-6 mt-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Estado actual</h2>
      <div id="currentConfig" class="text-sm text-gray-600 space-y-1">
        <p>Cargando...</p>
      </div>
    </section>
  </main>

  <script>
    const API = "/api";
    const $ = (id) => document.getElementById(id);
    const alertBox = $("alertBox");

    function showAlert(msg, type = "error") {
      alertBox.textContent = msg;
      alertBox.className = `mt-4 p-3 rounded-lg text-sm ${
        type === "error" ? "bg-red-50 text-red-700 border border-red-200" : "bg-green-50 text-green-700 border border-green-200"
      }`;
      alertBox.classList.remove("hidden");
      setTimeout(() => alertBox.classList.add("hidden"), 5000);
    }

    function getFormData() {
      return {
        host: $("host").value,
        port: parseInt($("port").value),
        user: $("user").value,
        password: $("password").value,
        database: $("database").value,
      };
    }

    async function loadConfig() {
      try {
        const res = await fetch(`${API}/db-config`);
        const data = await res.json();
        const c = data.config;
        $("currentConfig").innerHTML = `
          <p><strong>Host:</strong> ${c.host}</p>
          <p><strong>Puerto:</strong> ${c.port}</p>
          <p><strong>Usuario:</strong> ${c.user}</p>
          <p><strong>Password:</strong> ${c.password_set ? "****" : "(vacio)"}</p>
          <p><strong>Base de datos:</strong> ${c.database}</p>
        `;
      } catch {
        $("currentConfig").innerHTML = "<p class='text-red-500'>Error al cargar configuracion</p>";
      }
    }

    $("testBtn").addEventListener("click", async () => {
      $("testBtn").disabled = true;
      $("testBtn").textContent = "Probando...";
      const fd = new FormData();
      const data = getFormData();
      Object.entries(data).forEach(([k, v]) => fd.append(k, v));
      try {
        const res = await fetch(`${API}/db-config/test`, { method: "POST", body: fd });
        const result = await res.json();
        showAlert(result.message, result.success ? "success" : "error");
      } catch {
        showAlert("Error de red");
      } finally {
        $("testBtn").disabled = false;
        $("testBtn").textContent = "Probar conexion";
      }
    });

    $("dbConfigForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("saveBtn").disabled = true;
      $("saveBtn").textContent = "Guardando...";
      const fd = new FormData();
      const data = getFormData();
      Object.entries(data).forEach(([k, v]) => fd.append(k, v));
      try {
        const res = await fetch(`${API}/db-config`, { method: "POST", body: fd });
        if (res.ok) {
          showAlert("Configuracion guardada correctamente", "success");
          loadConfig();
        } else {
          const err = await res.json();
          showAlert(err.detail || "Error al guardar");
        }
      } catch {
        showAlert("Error de red");
      } finally {
        $("saveBtn").disabled = false;
        $("saveBtn").textContent = "Guardar configuracion";
      }
    });

    loadConfig();
  </script>
</body>
</html>
